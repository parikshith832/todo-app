<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <script>
      (() => {
        if (localStorage.getItem("todo-theme") === "dark") {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Todo App</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      rel="stylesheet"
    />
    <link th:href="@{/css/style.css}" rel="stylesheet" />
  </head>
  <body class="auth-page app-body">
    <div class="auth-wrapper">
      <div class="card auth-card shadow-lg">
        <div class="card-body p-4 p-md-5">
          <div class="text-center mb-4">
            <i class="fa-solid fa-user-plus fa-3x text-primary mb-3"></i>
            <h2 class="fw-bold">Create Account</h2>
            <p class="text-muted">Join and start organizing your tasks</p>
          </div>

          <form
            th:action="@{/register}"
            th:object="${registerDto}"
            method="post"
            novalidate
          >
            <div class="mb-3">
              <label for="fullName" class="form-label">Full Name</label>
              <input
                type="text"
                class="form-control"
                id="fullName"
                th:field="*{fullName}"
                th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"
              />
              <div class="invalid-feedback" th:errors="*{fullName}"></div>
            </div>
            <div class="mb-3">
              <label for="username" class="form-label">Username</label>
              <input
                type="text"
                class="form-control"
                id="username"
                th:field="*{username}"
                th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
              />
              <div class="invalid-feedback" th:errors="*{username}"></div>
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input
                type="email"
                class="form-control"
                id="email"
                th:field="*{email}"
                th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
              />
              <div class="invalid-feedback" th:errors="*{email}"></div>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input
                type="password"
                class="form-control"
                id="password"
                th:field="*{password}"
                th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
              />
              <div class="invalid-feedback" th:errors="*{password}"></div>
            </div>
            <div class="mb-4">
              <label for="confirmPassword" class="form-label"
                >Confirm Password</label
              >
              <input
                type="password"
                class="form-control"
                id="confirmPassword"
                th:field="*{confirmPassword}"
                th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
              />
              <div
                class="invalid-feedback"
                th:errors="*{confirmPassword}"
              ></div>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg">
              <i class="fa-solid fa-user-plus me-2"></i>Register
            </button>
          </form>

          <p class="text-center mt-4 mb-0">
            Already have an account?
            <a th:href="@{/login}" class="fw-semibold">Login here</a>
          </p>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
  </body>
</html>
