<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
  th:fragment="layout(title, content)"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:replace="${title}">Todo App</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css"
      rel="stylesheet"
    />
    <link th:href="@{/css/style.css}" rel="stylesheet" />
  </head>
  <body class="app-body">
    <nav
      class="navbar navbar-expand-lg navbar-dark app-navbar shadow-sm"
      sec:authorize="isAuthenticated()"
    >
      <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">
          <i class="fa-solid fa-list-check me-2"></i>
          Todo App
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbar"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbar">
          <ul class="navbar-nav ms-auto align-items-center">
            <li class="nav-item">
              <button id="themeToggle" class="btn btn-outline-light me-3">
                <i class="fa-solid fa-moon"></i>
              </button>
            </li>

            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle"
                href="#"
                role="button"
                data-bs-toggle="dropdown"
              >
                <i class="fa-solid fa-user-circle me-2"></i>

                <span sec:authentication="name">User</span>
              </a>

              <ul class="dropdown-menu dropdown-menu-end">
                <li>
                  <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="dropdown-item text-danger">
                      <i class="fa-solid fa-right-from-bracket me-2"></i>
                      Logout
                    </button>
                  </form>
                </li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      <div th:replace="${content}">Content</div>
    </main>
    <a th:href="@{/tasks/new}" class="floating-add-btn">
      <i class="fa-solid fa-plus"></i>
    </a>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:src="@{/js/app.js}"></script>
  </body>
</html>
