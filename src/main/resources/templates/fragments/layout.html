<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">Todo App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="app-body">
<nav class="navbar navbar-expand-lg navbar-dark app-navbar shadow-sm" sec:authorize="isAuthenticated()">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">
            <i class="fa-solid fa-list-check me-2"></i>Todo App
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/dashboard}"><i class="fa-solid fa-gauge-high me-1"></i>Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/tasks}"><i class="fa-solid fa-tasks me-1"></i>Tasks</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/calendar}"><i class="fa-solid fa-calendar-days me-1"></i>Calendar</a>
                </li>
            </ul>
            <div class="d-flex align-items-center gap-3">
                <button type="button" class="btn btn-sm btn-outline-light theme-toggle" id="themeToggle" title="Toggle dark mode">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <span class="text-light small d-none d-md-inline">
                    <i class="fa-solid fa-user me-1"></i><span sec:authentication="name">user</span>
                </span>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-sm btn-outline-light">
                        <i class="fa-solid fa-right-from-bracket me-1"></i>Logout
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div th:replace="${content}">Content</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
