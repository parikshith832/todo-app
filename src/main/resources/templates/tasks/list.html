<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <script>
      (() => {
        if (localStorage.getItem("todo-theme") === "dark") {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
    <title>Tasks - Todo App</title>
  </head>
  <body th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
    <section>
      <div
        class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4"
      >
        <div>
          <h1 class="page-title mb-1">
            <i class="fa-solid fa-tasks me-2 text-primary"></i>My Tasks
          </h1>
          <p class="text-muted mb-0">Manage and track all your tasks</p>
        </div>
        <a th:href="@{/tasks/new}" class="btn btn-primary">
          <i class="fa-solid fa-plus me-1"></i>Add Task
        </a>
      </div>

      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <div class="row g-3 align-items-center">
            <div class="col-md-6">
              <div class="input-group">
                <span class="input-group-text"
                  ><i class="fa-solid fa-search"></i
                ></span>
                <input
                  type="text"
                  class="form-control"
                  id="taskSearch"
                  placeholder="Search by title..."
                />
              </div>
            </div>
            <div class="col-md-6">
              <div class="filter-buttons d-flex flex-wrap gap-2">
                <a
                  th:href="@{/tasks}"
                  class="btn btn-sm"
                  th:classappend="${filter == 'all'} ? 'btn-primary' : 'btn-outline-secondary'"
                  >All</a
                >
                <a
                  th:href="@{/tasks(filter='pending')}"
                  class="btn btn-sm"
                  th:classappend="${filter == 'pending'} ? 'btn-primary' : 'btn-outline-secondary'"
                  >Pending</a
                >
                <a
                  th:href="@{/tasks(filter='completed')}"
                  class="btn btn-sm"
                  th:classappend="${filter == 'completed'} ? 'btn-primary' : 'btn-outline-secondary'"
                  >Completed</a
                >
                <a
                  th:href="@{/tasks(filter='today')}"
                  class="btn btn-sm"
                  th:classappend="${filter == 'today'} ? 'btn-primary' : 'btn-outline-secondary'"
                  >Today</a
                >
              </div>
            </div>
          </div>
        </div>
      </div>

      <div th:if="${#lists.isEmpty(tasks)}" class="empty-state card shadow-sm">
        <div class="card-body text-center py-5">
          <i class="fa-solid fa-inbox fa-3x text-muted mb-3"></i>
          <h4>No tasks found</h4>
          <p class="text-muted">Create your first task to get started.</p>
          <a th:href="@{/tasks/new}" class="btn btn-primary mt-2">
            <i class="fa-solid fa-plus me-1"></i>Add Task
          </a>
        </div>
      </div>

      <div class="row g-3" id="taskList">
        <div
          class="col-md-6 col-lg-4 task-item"
          th:each="task : ${tasks}"
          th:data-title="${task.title.toLowerCase()}"
        >
          <div
            class="card task-card shadow-sm h-100"
            th:classappend="${task.status.name() == 'COMPLETED'} ? 'task-completed' : ''"
          >
            <div class="card-body">
              <div
                class="d-flex justify-content-between align-items-start mb-2"
              >
                <span
                  class="badge priority-badge"
                  th:classappend="'priority-' + ${task.priority.name().toLowerCase()}"
                  th:text="${task.priority}"
                  >MEDIUM</span
                >
                <span
                  class="badge"
                  th:classappend="${task.status.name() == 'COMPLETED'} ? 'bg-success' : 'bg-warning text-dark'"
                  th:text="${task.status}"
                  >PENDING</span
                >
              </div>
              <h5 class="card-title task-title" th:text="${task.title}">
                Task Title
              </h5>
              <p
                class="card-text text-muted small text-truncate-2"
                th:if="${task.description}"
                th:text="${task.description}"
              >
                Description
              </p>
              <div class="task-meta small text-muted mb-3">
                <div th:if="${task.dueDate}">
                  <i class="fa-solid fa-calendar me-1"></i>
                  <span
                    th:text="${#temporals.format(task.dueDate, 'MMM dd, yyyy')}"
                  ></span>
                  <span
                    th:if="${task.dueTime}"
                    th:text="' at ' + ${#temporals.format(task.dueTime, 'hh:mm a')}"
                  ></span>
                </div>
                <div th:if="${task.category}">
                  <i class="fa-solid fa-tag me-1"></i
                  ><span th:text="${task.category}"></span>
                </div>
              </div>
              <div class="d-flex gap-2 flex-wrap">
                <a
                  th:href="@{/tasks/{id}(id=${task.id})}"
                  class="btn btn-sm btn-outline-primary"
                >
                  <i class="fa-solid fa-eye"></i>
                </a>
                <a
                  th:href="@{/tasks/{id}/edit(id=${task.id})}"
                  class="btn btn-sm btn-outline-secondary"
                >
                  <i class="fa-solid fa-pen"></i>
                </a>
                <form
                  th:action="@{/tasks/{id}/delete(id=${task.id})}"
                  method="post"
                  class="delete-form m-0"
                >
                  <button type="submit" class="btn btn-sm btn-outline-danger">
                    <i class="fa-solid fa-trash"></i>
                  </button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="noSearchResults" class="empty-state card shadow-sm d-none">
        <div class="card-body text-center py-5">
          <i class="fa-solid fa-magnifying-glass fa-3x text-muted mb-3"></i>
          <h4>No matching tasks</h4>
          <p class="text-muted">Try a different search term.</p>
        </div>
      </div>

      <div
        th:if="${toast}"
        id="flashToast"
        th:attr="data-toast=${toast}"
        class="d-none"
      ></div>
      <script th:src="@{/js/search.js}"></script>
    </section>
  </body>
</html>
