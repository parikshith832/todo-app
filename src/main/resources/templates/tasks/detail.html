<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${task.title + ' - Todo App'}">Task Detail</title>
</head>
<body th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<section>
    <div class="mb-4">
        <a th:href="@{/tasks}" class="btn btn-sm btn-outline-secondary">
            <i class="fa-solid fa-arrow-left me-1"></i>Back to Tasks
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-4">
            <div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-3">
                <div>
                    <h1 class="page-title mb-2" th:text="${task.title}">Task Title</h1>
                    <div class="d-flex flex-wrap gap-2">
                        <span class="badge priority-badge"
                              th:classappend="'priority-' + ${task.priority.name().toLowerCase()}"
                              th:text="${task.priority}">MEDIUM</span>
                        <span class="badge"
                              th:classappend="${task.status.name() == 'COMPLETED'} ? 'bg-success' : 'bg-warning text-dark'"
                              th:text="${task.status}">PENDING</span>
                        <span class="badge bg-secondary" th:if="${task.category}" th:text="${task.category}">Category</span>
                    </div>
                </div>
                <div class="d-flex flex-wrap gap-2">
                    <a th:href="@{/tasks/{id}/edit(id=${task.id})}" class="btn btn-outline-primary btn-sm">
                        <i class="fa-solid fa-pen me-1"></i>Edit
                    </a>
                    <form th:if="${task.status.name() == 'PENDING'}" th:action="@{/tasks/{id}/complete(id=${task.id})}" method="post" class="m-0">
                        <button type="submit" class="btn btn-success btn-sm">
                            <i class="fa-solid fa-check me-1"></i>Mark Complete
                        </button>
                    </form>
                    <form th:if="${task.status.name() == 'COMPLETED'}" th:action="@{/tasks/{id}/pending(id=${task.id})}" method="post" class="m-0">
                        <button type="submit" class="btn btn-warning btn-sm">
                            <i class="fa-solid fa-rotate-left me-1"></i>Mark Pending
                        </button>
                    </form>
                    <form th:action="@{/tasks/{id}/delete(id=${task.id})}" method="post" class="delete-form m-0">
                        <button type="submit" class="btn btn-outline-danger btn-sm">
                            <i class="fa-solid fa-trash me-1"></i>Delete
                        </button>
                    </form>
                </div>
            </div>

            <hr>

            <div class="row g-4">
                <div class="col-md-8">
                    <h5 class="text-muted mb-2">Description</h5>
                    <p th:if="${task.description}" th:text="${task.description}" class="mb-4">Description text</p>
                    <p th:unless="${task.description}" class="text-muted mb-4">No description provided.</p>

                    <h5 class="text-muted mb-2">Remarks</h5>
                    <p th:if="${task.remarks}" th:text="${task.remarks}">Remarks</p>
                    <p th:unless="${task.remarks}" class="text-muted">No remarks.</p>
                </div>
                <div class="col-md-4">
                    <div class="detail-sidebar p-3 rounded">
                        <div class="mb-3" th:if="${task.dueDate}">
                            <small class="text-muted d-block">Due Date</small>
                            <strong th:text="${#temporals.format(task.dueDate, 'EEEE, MMM dd, yyyy')}"></strong>
                        </div>
                        <div class="mb-3" th:if="${task.dueTime}">
                            <small class="text-muted d-block">Due Time</small>
                            <strong th:text="${#temporals.format(task.dueTime, 'hh:mm a')}"></strong>
                        </div>
                        <div class="mb-3">
                            <small class="text-muted d-block">Created</small>
                            <strong th:text="${#temporals.format(task.createdAt, 'MMM dd, yyyy hh:mm a')}"></strong>
                        </div>
                        <div>
                            <small class="text-muted d-block">Last Updated</small>
                            <strong th:text="${#temporals.format(task.updatedAt, 'MMM dd, yyyy hh:mm a')}"></strong>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${toast}" id="flashToast" th:attr="data-toast=${toast}" class="d-none"></div>
</section>
</body>
</html>
