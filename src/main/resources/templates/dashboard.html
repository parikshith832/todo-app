<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <script>
      (() => {
        if (localStorage.getItem("todo-theme") === "dark") {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
    <title>Dashboard - Todo App</title>
  </head>
  <body th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
    <section>
      <div class="page-header mb-4">
        <h1 class="page-title">
          <i class="fa-solid fa-hand-sparkles me-2 text-primary"></i>
          Welcome, <span th:text="${user.fullName}">User</span>!
        </h1>
        <p class="text-muted mb-0">Here's an overview of your tasks.</p>
      </div>

      <div class="row g-4 mb-4">
        <div class="col-sm-6 col-xl-3">
          <div class="stat-card stat-total">
            <div class="stat-icon"><i class="fa-solid fa-list"></i></div>
            <div>
              <div class="stat-value" th:text="${stats.totalTasks}">0</div>
              <div class="stat-label">Total Tasks</div>
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-xl-3">
          <div class="stat-card stat-pending">
            <div class="stat-icon"><i class="fa-solid fa-clock"></i></div>
            <div>
              <div class="stat-value" th:text="${stats.pendingTasks}">0</div>
              <div class="stat-label">Pending Tasks</div>
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-xl-3">
          <div class="stat-card stat-completed">
            <div class="stat-icon">
              <i class="fa-solid fa-circle-check"></i>
            </div>
            <div>
              <div class="stat-value" th:text="${stats.completedTasks}">0</div>
              <div class="stat-label">Completed Tasks</div>
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-xl-3">
          <div class="stat-card stat-today">
            <div class="stat-icon">
              <i class="fa-solid fa-calendar-day"></i>
            </div>
            <div>
              <div class="stat-value" th:text="${stats.todayTasks}">0</div>
              <div class="stat-label">Today's Tasks</div>
            </div>
          </div>
        </div>
      </div>

      <div class="row g-4">
        <div class="col-md-4">
          <a th:href="@{/tasks/new}" class="quick-action-card">
            <i class="fa-solid fa-plus fa-2x mb-2"></i>
            <span>Add New Task</span>
          </a>
        </div>
        <div class="col-md-4">
          <a th:href="@{/tasks(filter='today')}" class="quick-action-card">
            <i class="fa-solid fa-calendar-day fa-2x mb-2"></i>
            <span>View Today's Tasks</span>
          </a>
        </div>
        <div class="col-md-4">
          <a th:href="@{/calendar}" class="quick-action-card">
            <i class="fa-solid fa-calendar fa-2x mb-2"></i>
            <span>Open Calendar</span>
          </a>
        </div>
      </div>
    </section>
  </body>
</html>
