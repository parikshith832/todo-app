<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <script>
      (() => {
        if (localStorage.getItem("todo-theme") === "dark") {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
    <title>Dashboard - Todo App</title>
  </head>
  <body th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
    <section>
      <div class="page-header mb-4">
        <h1 class="page-title">
          <i class="fa-solid fa-hand-sparkles me-2 text-primary"></i>
          Welcome, <span th:text="${user.fullName}">User</span>!
        </h1>
        <p class="text-muted mb-0">Here's an overview of your tasks.</p>
      </div>

      <div class="row g-4 mb-4">
        <div class="col-sm-6 col-xl-3">
          <div class="stat-card stat-total">
            <div class="stat-icon"><i class="fa-solid fa-list"></i></div>
            <div>
              <div class="stat-value" th:text="${stats.totalTasks}">0</div>
              <div class="stat-label">Total Tasks</div>
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-xl-3">
          <div class="stat-card stat-pending">
            <div class="stat-icon"><i class="fa-solid fa-clock"></i></div>
            <div>
              <div class="stat-value" th:text="${stats.pendingTasks}">0</div>
              <div class="stat-label">Pending Tasks</div>
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-xl-3">
          <div class="stat-card stat-completed">
            <div class="stat-icon">
              <i class="fa-solid fa-circle-check"></i>
            </div>
            <div>
              <div class="stat-value" th:text="${stats.completedTasks}">0</div>
              <div class="stat-label">Completed Tasks</div>
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-xl-3">
          <div class="stat-card stat-today">
            <div class="stat-icon">
              <i class="fa-solid fa-calendar-day"></i>
            </div>
            <div>
              <div class="stat-value" th:text="${stats.todayTasks}">0</div>
              <div class="stat-label">Today's Tasks</div>
            </div>
          </div>
        </div>
      </div>

      <div class="row g-4">
        <div class="col-md-4">
          <a th:href="@{/tasks/new}" class="quick-action-card">
            <i class="fa-solid fa-plus fa-2x mb-2"></i>
            <span>Add New Task</span>
          </a>
        </div>
        <div class="col-md-4">
          <a th:href="@{/tasks(filter='today')}" class="quick-action-card">
            <i class="fa-solid fa-calendar-day fa-2x mb-2"></i>
            <span>View Today's Tasks</span>
          </a>
        </div>
        <div class="col-md-4">
          <a th:href="@{/calendar}" class="quick-action-card">
            <i class="fa-solid fa-calendar fa-2x mb-2"></i>
            <span>Open Calendar</span>
          </a>
        </div>
        <div class="card shadow-sm mb-4">
          <div class="card-header bg-transparent">
            <h5 class="mb-0">
              <i class="fa-solid fa-clock me-2 text-primary"></i>

              Today's Schedule
            </h5>
          </div>

          <div class="card-body">

            <div th:if="${#lists.isEmpty(todayTasks)}"
                 class="text-center text-muted py-4">

              No tasks for today.

            </div>

            <div th:each="task : ${todayTasks}"
                 class="schedule-item">

              <div>

                <strong th:text="${task.title}"></strong>

                <div class="text-muted small"
                     th:text="${task.category}"></div>

              </div>

              <div class="text-end">

            <span class="badge priority-badge"
                  th:classappend="'priority-' + ${task.priority.name().toLowerCase()}"
                  th:text="${task.priority}">
            </span>

                <div class="small"
                     th:if="${task.dueTime}"
                     th:text="${#temporals.format(task.dueTime,'HH:mm')}">
                </div>

              </div>

            </div>

          </div>
        </div>
        <!-- Recent Tasks -->

        <div class="row g-4">
          <div class="col-12">
            <div class="card shadow-sm">
              <div
                      class="card-header bg-transparent d-flex justify-content-between align-items-center"
              >
                <h5 class="mb-0">
                  <i class="fa-solid fa-list-check text-primary me-2"></i>

                  Recent Tasks
                </h5>

                <a th:href="@{/tasks}" class="btn btn-primary btn-sm"> View All </a>
              </div>

              <div class="card-body p-0">
                <div class="table-responsive">
                  <table class="table table-hover align-middle mb-0">
                    <thead>
                    <tr>
                      <th>Title</th>

                      <th>Priority</th>

                      <th>Status</th>

                      <th>Due</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="task : ${recentTasks}">

                      <td th:text="${task.title}"></td>

                      <td>

        <span class="badge priority-badge"
              th:classappend="'priority-' + ${task.priority.name().toLowerCase()}"
              th:text="${task.priority}">
        </span>

                      </td>

                      <td>

        <span class="badge"
              th:classappend="${task.status.name() == 'COMPLETED'} ? 'bg-success' : 'bg-warning text-dark'"
              th:text="${task.status}">
        </span>

                      </td>

                      <td th:text="${#temporals.format(task.dueDate,'MMM dd, yyyy')}"></td>

                    </tr>

                    <tr th:if="${#lists.isEmpty(recentTasks)}">

                      <td colspan="4" class="text-center text-muted py-4">

                        No recent tasks found.

                      </td>

                    </tr>

                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>
        </div>
      </div>
    </section>
  </body>
</html>
